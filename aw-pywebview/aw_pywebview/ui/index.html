<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ActivityWatch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">AW</div>
          <div>
            <div class="title">ActivityWatch</div>
            <div class="subtitle">本地专注 · 中文桌面版</div>
          </div>
        </div>
        <div class="toolbar">
          <button id="reportBtn" class="btn secondary">生成今日报告</button>
          <button id="refreshBtn" class="btn">刷新数据</button>
          <select id="rangeSelect" class="select">
            <option value="1">近 24 小时</option>
            <option value="3">近 3 天</option>
            <option value="7">近 7 天</option>
          </select>
        </div>
      </header>

      <main class="grid">
        <section class="card">
          <div class="card-header">
            <h2>概览</h2>
            <span id="status" class="badge">加载中</span>
          </div>
          <div class="stats">
            <div class="stat">
              <div class="stat-label">有效时长</div>
              <div id="activeDuration" class="stat-value">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">应用数量</div>
              <div id="appCount" class="stat-value">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">时间区间</div>
              <div id="timeRange" class="stat-value">-</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>Top 应用</h2>
            <span class="hint">按使用时长排序</span>
          </div>
          <ul id="appList" class="list">
            <li class="list-item">加载中...</li>
          </ul>
        </section>

        <section class="card full">
          <div class="card-header">
            <h2>输入强度（Top 6 应用）</h2>
            <span class="hint">键盘 / 鼠标点击 / 滚轮</span>
          </div>
          <div id="inputTable" class="input-table">
            <div class="input-row header">
              <div>应用</div>
              <div>键盘</div>
              <div>点击</div>
              <div>滚轮</div>
            </div>
          </div>
        </section>

        <section class="card full">
          <div class="card-header">
            <h2>时间轴</h2>
            <span class="hint">按时间顺序展示活动与分类</span>
          </div>
          <div class="timeline-axis">
            <div class="axis-label">00:00</div>
            <div class="axis-label">06:00</div>
            <div class="axis-label">12:00</div>
            <div class="axis-label">18:00</div>
            <div class="axis-label">24:00</div>
          </div>
          <div class="timeline-bars" id="timelineBars"></div>
          <div class="timeline" id="timeline"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
